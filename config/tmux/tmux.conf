# Prefix set to Ctrl+Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# UX: Status bar at the top
set -g status-position top

# Start window and pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1

# Rozejin Palette from color-specs.md
rz_bg_statusline="#181b1c"
rz_fg="#eadfe2"
rz_rose="#ff9fc0"
rz_fg_nc="#7d6f73"
rz_bg_visual="#43313a"
rz_aqua="#aac3cf"
rz_bg_reference="#353039"

# Status bar base
set -g status-style "bg=${rz_bg_statusline},fg=${rz_fg}"

# Left: Session name, quiet and non-dominant
set -g status-left "#[fg=${rz_fg_nc}]#S #[default]"

# Windows: minimal tab bar with index
# Inactive window
setw -g window-status-format "#[fg=${rz_fg_nc}] #I:#W "
# Active window
setw -g window-status-current-format "#[fg=${rz_rose},bg=${rz_bg_visual},bold] #I:#W "

# Right: git branch
set -g status-right '#(cd "#{pane_current_path}" 2>/dev/null && git rev-parse --is-inside-work-tree >/dev/null 2>&1 && printf "#[fg=${rz_aqua}] ")'

# Pane borders: subtle focus
set -g pane-border-style "fg=${rz_bg_reference}"
set -g pane-active-border-style "fg=${rz_rose}"

# Command line / Message style
set -g message-style "fg=${rz_rose},bg=${rz_bg_statusline}"
