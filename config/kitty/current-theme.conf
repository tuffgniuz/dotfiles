## upstream: https://raw.githubusercontent.com/rsaihe/gruvbox-material-kitty/main/colors/gruvbox-material-dark-hard.conf
## blurb: A modified version of Gruvbox with softer contrasts

background #1d2021
foreground #d4be98

selection_background #d4be98
selection_foreground #1d2021

cursor #a89984
cursor_text_color background

# Black
color0 #665c54
color8 #928374

# Red
color1 #ea6962
color9 #ea6962

# Green
color2  #a9b665
color10 #a9b665

# Yellow
color3  #e78a4e
color11 #d8a657

# Blue
color4  #7daea3
color12 #7daea3

# Magenta
color5  #d3869b
color13 #d3869b

# Cyan
color6  #89b482
color14 #89b482

# White
color7  #d4be98
color15 #d4be98

# --- TAB BAR CONFIGURATION (Matches Tmux Status Bar) ---
# Position: Top (Matches set -g status-position top)
tab_bar_edge top

# Style: Minimal separator (Matches Tmux status-style)
tab_bar_style separator
tab_separator ""

# Background for the whole bar (Matches gm_bg / status-style bg)
tab_bar_background #1d2021

# Active Window Tab (Matches: setw -g window-status-current-format)
# Text: Red, Bg: Bg2 (#3c3836), Bold
active_tab_foreground   #ea6962
active_tab_background   #3c3836
active_tab_font_style   bold
tab_title_template      " {title} "

# Inactive Window Tab (Matches: setw -g window-status-format)
# Text: Grey (#928374), Bg: Main Background (#1d2021)
inactive_tab_foreground #928374
inactive_tab_background #1d2021
inactive_tab_font_style normal


# --- WINDOW BORDER CONFIGURATION (Matches Tmux Pane Borders) ---

# 2. Set the color for the currently active window (Matches gm_red)
active_border_color #ea6962

# 3. Set the color for all other (inactive) windows (Matches gm_bg2 / #3c3836)
inactive_border_color #3c3836
