name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  smoke-test:
    name: "Smoke Test (Symlinks)"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run installer smoke test
        working-directory: ./dotfiles
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/config
          SKIP_CLONES: "1"
          SKIP_HELPERS: "1"
        run: |
          set -euo pipefail
          mkdir -p "$XDG_CONFIG_HOME"
          ./install.sh

  test-packages:
    name: "Test Package Installation (Arch)"
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Prepare Arch Linux container
        run: |
          pacman-key --init
          pacman-key --populate
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm base-devel git sudo

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install paru and run package installer
        run: |
          # Create a non-root user to build and run paru
          useradd -m builder -G wheel
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # Change ownership of the checked out repo to the builder user
          chown -R builder:builder /github/workspace
          
          # Execute the rest of the script as the builder user, which is required for makepkg
          su - builder -c '
            set -euo pipefail
            
            echo "--- Cloning and installing paru ---"
            git clone https://aur.archlinux.org/paru-bin.git /tmp/paru-bin
            cd /tmp/paru-bin
            makepkg -si --noconfirm
            
            echo "--- Running install-packages.sh from workspace ---"
            cd /github/workspace/dotfiles
            ./scripts/install-packages.sh --noconfirm
          '
