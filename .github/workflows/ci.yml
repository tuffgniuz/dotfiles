name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  setup-test:
    name: "Setup Test (Arch)"
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Prepare Arch Linux container
        run: |
          pacman-key --init
          pacman-key --populate
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm base-devel git sudo

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run full setup
        run: |
          # Create a non-root user to build and run paru
          useradd -m builder -G wheel
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          install -d -o builder -g builder /tmp/xdg-config
          chown -R builder:builder "$GITHUB_WORKSPACE"

          # Execute the installer as the non-root user, which is required for paru bootstrap.
          su - builder -c "
            set -euo pipefail
            export XDG_CONFIG_HOME=/tmp/xdg-config
            export XDG_DATA_HOME=/tmp/xdg-data
            export SKIP_CLONES=1
            export SKIP_HELPERS=1
            cd \"$GITHUB_WORKSPACE\"
            ./install.sh --noconfirm
            test -L \"\$XDG_CONFIG_HOME/fish\"
            test -L \"\$XDG_CONFIG_HOME/tmux\"
            test -d \"\$XDG_DATA_HOME/themes\"
            command -v paru >/dev/null
          "
