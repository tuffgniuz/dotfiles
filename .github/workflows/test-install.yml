name: test-install

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run installer in isolated config directory
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/config
          SKIP_CLONES: "1"
          SKIP_HELPERS: "1"
        run: |
          set -euo pipefail
          mkdir -p "$XDG_CONFIG_HOME"
          ./install.sh

      - name: Verify expected symlinks
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/config
        run: |
          set -euo pipefail
          for path in fish ghostty kitty mako rofi themes wofi yazi zathura; do
            test -L "$XDG_CONFIG_HOME/$path"
          done

      - name: Verify backups and idempotent rerun
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/config
          SKIP_CLONES: "1"
          SKIP_HELPERS: "1"
        run: |
          set -euo pipefail
          rm "$XDG_CONFIG_HOME/rofi"
          rm "$XDG_CONFIG_HOME/kitty"
          mkdir -p "$XDG_CONFIG_HOME/rofi"
          printf 'local config\n' > "$XDG_CONFIG_HOME/kitty"

          ./install.sh

          test -L "$XDG_CONFIG_HOME/rofi"
          test -L "$XDG_CONFIG_HOME/kitty"

          compgen -G "$XDG_CONFIG_HOME/kitty.backup.*" > /dev/null

          before="$(readlink "$XDG_CONFIG_HOME/kitty")"
          ./install.sh
          after="$(readlink "$XDG_CONFIG_HOME/kitty")"

          test "$before" = "$after"
